<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CampusPulse Cover</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 1600px;
        height: 900px;
        overflow: hidden;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #ffffff;
        background: #001b41;
      }

      .cover {
        position: relative;
        width: 1600px;
        height: 900px;
        background:
          linear-gradient(90deg, rgba(255, 210, 0, 0.12) 1px, transparent 1px),
          linear-gradient(0deg, rgba(255, 210, 0, 0.1) 1px, transparent 1px),
          linear-gradient(135deg, #001b41 0%, #003b5c 48%, #0064a4 100%);
        background-size: 56px 56px, 56px 56px, auto;
      }

      .cover::before {
        position: absolute;
        top: 72px;
        right: 78px;
        width: 720px;
        height: 520px;
        content: "";
        background:
          linear-gradient(90deg, transparent 0 11%, rgba(255, 210, 0, 0.85) 11% 14%, transparent 14% 24%, rgba(47, 183, 164, 0.72) 24% 27%, transparent 27% 46%, rgba(255, 255, 255, 0.38) 46% 49%, transparent 49%),
          linear-gradient(0deg, transparent 0 18%, rgba(255, 255, 255, 0.12) 18% 20%, transparent 20% 42%, rgba(255, 210, 0, 0.28) 42% 44%, transparent 44% 100%);
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 8px;
        box-shadow: 0 34px 110px rgba(0, 0, 0, 0.3);
        opacity: 0.9;
      }

      .cover::after {
        position: absolute;
        right: -120px;
        bottom: -52px;
        width: 850px;
        height: 360px;
        content: "";
        background: linear-gradient(90deg, #ffd200 0 14%, transparent 14% 18%, #7ad7cc 18% 26%, transparent 26% 34%, rgba(255, 255, 255, 0.5) 34% 42%, transparent 42%);
        clip-path: polygon(0 36%, 100% 0, 100% 100%, 8% 84%);
        opacity: 0.34;
      }

      .copy {
        position: absolute;
        top: 104px;
        left: 110px;
        width: 780px;
      }

      .mark {
        display: inline-flex;
        align-items: center;
        gap: 18px;
        margin-bottom: 52px;
        font-size: 30px;
        font-weight: 900;
      }

      .mark span {
        display: grid;
        place-items: center;
        width: 74px;
        height: 74px;
        color: #001b41;
        background: #ffd200;
        border-radius: 16px;
        box-shadow: 0 20px 54px rgba(255, 210, 0, 0.28);
      }

      .eyebrow {
        display: flex;
        align-items: center;
        gap: 16px;
        margin: 0 0 26px;
        color: #ffe985;
        font-size: 24px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .eyebrow::before {
        width: 72px;
        height: 6px;
        content: "";
        background: #ffd200;
        border-radius: 999px;
      }

      h1 {
        margin: 0;
        max-width: 740px;
        font-size: 92px;
        line-height: 0.95;
        font-weight: 900;
        letter-spacing: 0;
      }

      .tagline {
        margin: 36px 0 0;
        max-width: 720px;
        color: #dcefff;
        font-size: 34px;
        line-height: 1.25;
      }

      .pill-row {
        display: flex;
        gap: 16px;
        margin-top: 50px;
      }

      .pill {
        padding: 15px 22px;
        color: #001b41;
        background: #ffd200;
        border-radius: 999px;
        font-size: 21px;
        font-weight: 850;
      }

      .stats {
        position: absolute;
        right: 94px;
        bottom: 86px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
        width: 690px;
      }

      .stat {
        min-height: 136px;
        padding: 24px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-top: 5px solid #ffd200;
        border-radius: 8px;
      }

      .stat strong {
        display: block;
        color: #ffd200;
        font-size: 43px;
        line-height: 1;
      }

      .stat span {
        display: block;
        margin-top: 14px;
        color: #e7f3ff;
        font-size: 19px;
        line-height: 1.22;
      }
    </style>
  </head>
  <body>
    <main class="cover" aria-label="CampusPulse Devpost cover">
      <section class="copy">
        <div class="mark"><span>CP</span> CampusPulse</div>
        <p class="eyebrow">UCI-inspired blue & gold</p>
        <h1>Campus energy intelligence</h1>
        <p class="tagline">Python analytics that find wasted power before it becomes invisible.</p>
        <div class="pill-row">
          <div class="pill">Python backend</div>
          <div class="pill">Anomaly detection</div>
          <div class="pill">Action ranking</div>
        </div>
      </section>

      <section class="stats" aria-label="Project highlights">
        <div class="stat">
          <strong>6</strong>
          <span>campus buildings analyzed</span>
        </div>
        <div class="stat">
          <strong>24h</strong>
          <span>energy demand patterns</span>
        </div>
        <div class="stat">
          <strong>CSV</strong>
          <span>judge-friendly data export</span>
        </div>
      </section>
    </main>
  </body>
</html>
